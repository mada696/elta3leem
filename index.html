<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة سوهاج التعليمية | منظومة الغياب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Cairo', sans-serif;
            /* خلفية خضراء ملكية متدرجة فخمة وبسيطة */
            background: linear-gradient(135deg, #1D6F42, #14502f);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            color: #ffffff; overflow: hidden;
        }
        .splash-content {
            text-align: center;
            animation: fadeIn 1.2s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 0 20px; /* مسافة أمان يمين ويسار للشاشات الصغيرة */
        }
        
        /* النص الرسمي باللون الأبيض النقي */
        h3 { 
            margin: 0; 
            font-weight: 600; 
            font-size: 1.8rem; 
            color: #ffffff;
            opacity: 0.9;
        }
        
        h1 {
            margin: 20px 0; 
            font-size: 3.5rem; 
            font-weight: 900;
            color: #ffffff;
            /* فاصل بسيط وأنيق */
            border-top: 2px solid rgba(255,255,255,0.3);
            border-bottom: 2px solid rgba(255,255,255,0.3);
            padding: 25px 0; 
            text-shadow: 0 4px 15px rgba(0,0,0,0.2);
            line-height: 1.4;
        }
        
        .designer-box { 
            margin-top: 40px; 
            padding: 15px 30px;
            background: rgba(255,255,255,0.1); /* إطار شفاف خلف الاسم */
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .designer-box p { 
            margin: 0; 
            font-size: 1.4rem; 
            color: #ffffff;
            opacity: 0.8;
        }
        /* اسم المصمم باللون الأبيض البارز */
        .designer-name { 
            font-size: 2.5rem; 
            font-weight: 900; 
            color: #ffffff; 
            margin-top: 5px; 
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* مؤشر التحميل الأصفر الذهبي */
        .loader {
            width: 50px; 
            height: 50px; 
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-top: 5px solid #ffc107; /* اللون الأصفر الذهبي */
            border-radius: 50%;
            animation: spin 1s linear infinite; 
            margin-top: 40px;
        }
        
        /* تأثير الدخول */
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* حركة دوران المؤشر */
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }

        /* ================= تصغير الخطوط لشاشات الموبايل ================= */
        @media (max-width: 600px) {
            h3 { 
                font-size: 1.1rem; /* تصغير اسم الإدارة والقسم */
            }
            h1 {
                font-size: 1.8rem; /* تصغير العنوان الرئيسي بشكل مناسب */
                padding: 15px 0;
                margin: 15px 0;
            }
            .designer-box {
                margin-top: 30px;
                padding: 10px 25px;
            }
            .designer-box p {
                font-size: 1rem;
            }
            .designer-name {
                font-size: 1.6rem; /* تصغير اسم المصمم */
            }
            .loader {
                width: 40px;
                height: 40px;
                margin-top: 30px;
            }
        }
    </style>
    <script>
        // التحويل التلقائي لصفحة التسجيل بعد 4 ثواني
        setTimeout(() => {
            window.location.href = "tasgeel.html";
        }, 4000);
    </script>
</head>
<body>
    <div class="splash-content">
        <h3>مديرية التربية والتعليم بسوهاج</h3>
        <h3>إدارة سوهاج التعليمية</h3>
        <h3>قسم التعليم الإعدادي والثانوي</h3>
        
        <h1>تسجيل الغياب اليومي للمدارس</h1>
        
        <div class="designer-box">
            <p>إعداد وتصميم</p>
            <div class="designer-name">الأستاذ / علاء الوكيل</div>
        </div>

        <div class="loader"></div>
    </div>
</body>
</html>
